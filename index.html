<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexica — Spaced Repetition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #e0dbd4;
      --border2: #c8c2ba;
      --text: #1a1814;
      --text2: #6b6560;
      --text3: #a09890;
      --accent: #2d2a26;
      --blue-bg: #e8f0fb; --blue-text: #1a4a8a;
      --green-bg: #e4f5ec; --green-text: #1a6b3a;
      --amber-bg: #fdf0db; --amber-text: #7a4a0a;
      --red-bg: #fdecea; --red-text: #8a2020;
      --teal-bg: #e0f4ef; --teal-text: #0a5a46;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18161400;
        --surface: #1e1c19;
        --surface2: #252320;
        --border: #2e2c28;
        --border2: #3e3c38;
        --text: #f0ede8;
        --text2: #a09890;
        --text3: #6b6560;
        --accent: #e8e4de;
        --blue-bg: #0e2040; --blue-text: #90b8f0;
        --green-bg: #0a2818; --green-text: #7ad0a0;
        --amber-bg: #2a1e08; --amber-text: #f0b860;
        --red-bg: #280e0e; --red-text: #f09090;
        --teal-bg: #082018; --teal-text: #60c8a8;
      }
      body { background: #181614; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    #app {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1.25rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .brand { flex: 1; }
    .brand h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
    .brand p  { font-size: 12px; color: var(--text3); margin-top: 1px; }

    nav { display: flex; gap: 6px; }
    .tab {
      font-size: 13px;
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      font-weight: 500;
    }
    .tab:hover { background: var(--surface2); color: var(--text); }
    .tab.active { background: var(--accent); color: var(--surface); border-color: var(--accent); }

    .hidden { display: none !important; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
    .stat-val { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--surface);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      padding: 7px 16px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-secondary:hover { background: var(--surface2); color: var(--text); }

    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }
    .word-list { display: flex; flex-direction: column; gap: 6px; }
    .word-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
    }
    .word-item .name { font-weight: 600; min-width: 100px; color: var(--text); }
    .word-item .phon { color: var(--text2); font-style: italic; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-due   { background: var(--amber-bg); color: var(--amber-text); }
    .badge-new   { background: var(--green-bg);  color: var(--green-text); }
    .badge-ok    { background: var(--surface2); color: var(--text3); }
    .del-btn {
      margin-left: auto;
      font-size: 12px;
      color: var(--text3);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      cursor: pointer;
    }
    .del-btn:hover { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
    .empty { text-align: center; color: var(--text3); font-size: 14px; padding: 2.5rem 0; }

    .import-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .import-box label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
    .import-box textarea {
      width: 100%;
      height: 100px;
      resize: vertical;
      font-size: 14px;
      font-family: monospace;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      line-height: 1.6;
    }
    .import-box textarea:focus { outline: none; border-color: var(--border2); }
    .import-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    #import-status { font-size: 12px; flex: 1; }
    .log { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; max-height: 160px; overflow-y: auto; }
    .log-ok      { font-size: 12px; color: var(--green-text); }
    .log-skip    { font-size: 12px; color: var(--text3); }
    .log-err     { font-size: 12px; color: var(--red-text); }
    .log-loading { font-size: 12px; color: var(--text3); }

    .card-meta { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 10px; }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .3s;
    }

    .card-scene { perspective: 1000px; margin-bottom: 14px; }
    .card-inner {
      position: relative;
      width: 100%;
      height: 230px;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card-back { transform: rotateY(180deg); }

    .card-word { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); margin-bottom: 6px; }
    .card-phon { font-size: 16px; color: var(--text2); font-style: italic; margin-bottom: 8px; }
    .card-pos  {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--text3);
      margin-bottom: 10px;
    }
    .card-def  { font-size: 15px; color: var(--text); line-height: 1.6; max-width: 340px; }
    .card-ex   {
      font-size: 13px;
      color: var(--text2);
      font-style: italic;
      line-height: 1.55;
      max-width: 340px;
      margin-top: 10px;
      border-left: 2px solid var(--border2);
      padding-left: 12px;
      text-align: left;
    }
    .card-hint { font-size: 12px; color: var(--text3); margin-top: 12px; }

    .feedback {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .fb {
      padding: 10px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: all .15s;
      line-height: 1.3;
    }
    .fb small { font-size: 11px; display: block; color: var(--text3); margin-top: 2px; font-weight: 400; }
    .fb.q0 { border-color: #f09595; }
    .fb.q0:hover { background: var(--red-bg);   color: var(--red-text); }
    .fb.q1 { border-color: #fac775; }
    .fb.q1:hover { background: var(--amber-bg); color: var(--amber-text); }
    .fb.q2 { border-color: #9fe1cb; }
    .fb.q2:hover { background: var(--teal-bg);  color: var(--teal-text); }
    .fb.q3 { border-color: #85b7eb; }
    .fb.q3:hover { background: var(--blue-bg);  color: var(--blue-text); }

    .done {
      text-align: center;
      padding: 3rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .done-icon { font-size: 40px; margin-bottom: 12px; }
    .done h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .done p  { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>Lexica</h1>
      <p>spaced repetition</p>
    </div>
    <nav>
      <button class="tab active" data-page="home"   onclick="nav('home')">home</button>
      <button class="tab"        data-page="review" onclick="nav('review')">review</button>
      <button class="tab"        data-page="import" onclick="nav('import')">import</button>
    </nav>
  </header>

  <!-- HOME -->
  <section id="page-home">
    <div class="stats">
      <div class="stat"><div class="stat-label">due today</div><div class="stat-val" id="s-due">0</div></div>
      <div class="stat"><div class="stat-label">new today</div><div class="stat-val" id="s-new">0</div></div>
      <div class="stat"><div class="stat-label">total</div><div class="stat-val" id="s-total">0</div></div>
    </div>
    <button class="btn-primary" onclick="nav('review')" style="margin-bottom:1.5rem">start review session</button>
    <div class="section-title">your words</div>
    <div class="word-list" id="home-list"></div>
  </section>

  <!-- REVIEW -->
  <section id="page-review" class="hidden">
    <div id="review-area"></div>
  </section>

  <!-- IMPORT -->
  <section id="page-import" class="hidden">
    <div class="import-box">
      <label>enter words — one per line or comma-separated</label>
      <textarea id="import-input" placeholder="ephemeral&#10;serendipity&#10;lucid, tenacious"></textarea>
      <div class="import-actions">
        <button class="btn-primary" onclick="doImport()" style="width:auto;padding:8px 18px">import words</button>
        <span id="import-status"></span>
      </div>
      <div class="log" id="import-log"></div>
    </div>
    <div class="section-title">library</div>
    <div class="word-list" id="import-list"></div>
  </section>
</div>

<script>
const KEY = 'lexica_v2';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } };
const save = db => localStorage.setItem(KEY, JSON.stringify(db));

const today = () => new Date().toISOString().slice(0,10);
const isDue  = c => !c.nextReview || c.nextReview <= today();

function sm2(card, q) {
  let { ef = 2.5, reps = 0, interval = 1 } = card;
  ef = Math.max(1.3, ef + 0.1 - (3 - q) * (0.08 + (3 - q) * 0.02));
  if (q < 2) { reps = 0; interval = 1; }
  else {
    reps++;
    if (reps === 1) interval = 1;
    else if (reps === 2) interval = 6;
    else interval = Math.round(interval * ef);
  }
  const next = new Date();
  next.setDate(next.getDate() + interval);
  return { ...card, ef, reps, interval, nextReview: next.toISOString().slice(0,10), lastReview: today() };
}

async function fetchWord(word) {
  const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.trim().toLowerCase())}`);
  if (!r.ok) throw new Error('not found');
  const [entry] = await r.json();
  const phon    = (entry.phonetics || []).find(p => p.text)?.text || '';
  const meaning = (entry.meanings || [])[0] || {};
  const def     = (meaning.definitions || [])[0] || {};
  return {
    word:       entry.word || word,
    phonetic:   phon,
    pos:        meaning.partOfSpeech || '',
    definition: def.definition || '',
    example:    def.example    || '',
  };
}

let todayNew = 0;

function nav(page) {
  ['home','review','import'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('hidden', p !== page);
    document.querySelector(`[data-page="${p}"]`).classList.toggle('active', p === page);
  });
  if (page === 'home')   renderHome();
  if (page === 'review') startReview();
  if (page === 'import') renderImportList();
}

function renderHome() {
  const db = load();
  document.getElementById('s-due').textContent   = db.filter(isDue).length;
  document.getElementById('s-new').textContent   = todayNew;
  document.getElementById('s-total').textContent = db.length;
  const el = document.getElementById('home-list');
  if (!db.length) { el.innerHTML = '<div class="empty">no words yet — go to import</div>'; return; }
  el.innerHTML = [...db].sort((a,b) => (isDue(a)?0:1)-(isDue(b)?0:1)).slice(0,30).map(c => `
    <div class="word-item">
      <span class="name">${c.word}</span>
      <span class="phon">${c.phonetic || ''}</span>
      <span class="badge ${isDue(c)?'badge-due':'badge-ok'}">${isDue(c)?'due':'next: '+c.nextReview}</span>
    </div>`).join('');
}

let queue = [], qIdx = 0, flipped = false;

function startReview() {
  queue = load().filter(isDue);
  qIdx  = 0;
  flipped = false;
  renderCard();
}

function renderCard() {
  const el = document.getElementById('review-area');
  if (!queue.length) {
    el.innerHTML = `<div class="done">
      <div class="done-icon">✓</div>
      <h2>all caught up!</h2>
      <p>no cards due right now — add more words or come back later</p>
      <button class="btn-secondary" onclick="nav('import')">import words →</button>
    </div>`; return;
  }
  if (qIdx >= queue.length) {
    el.innerHTML = `<div class="done">
      <div class="done-icon">★</div>
      <h2>session complete</h2>
      <p>reviewed ${queue.length} card${queue.length > 1 ? 's' : ''} today</p>
      <button class="btn-secondary" onclick="nav('home')">back to home</button>
    </div>`; return;
  }
  const c   = queue[qIdx];
  const pct = Math.round((qIdx / queue.length) * 100);
  flipped   = false;
  el.innerHTML = `
    <div class="card-meta">${qIdx + 1} / ${queue.length}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card-scene">
      <div class="card-inner" id="ci" onclick="flip()">
        <div class="card-face card-front">
          <div class="card-word">${c.word}</div>
          <div class="card-phon">${c.phonetic || ''}</div>
          <div class="card-hint">tap to reveal</div>
        </div>
        <div class="card-face card-back">
          ${c.pos ? `<span class="card-pos">${c.pos}</span>` : ''}
          <div class="card-def">${c.definition || '(no definition available)'}</div>
          ${c.example ? `<div class="card-ex">"${c.example}"</div>` : ''}
        </div>
      </div>
    </div>
    <div class="feedback hidden" id="fb">
      <button class="fb q0" onclick="rate(0)">陌生<small>forgotten</small></button>
      <button class="fb q1" onclick="rate(1)">模糊<small>hard</small></button>
      <button class="fb q2" onclick="rate(2)">熟悉<small>good</small></button>
      <button class="fb q3" onclick="rate(3)">简单<small>easy</small></button>
    </div>`;
}

function flip() {
  if (flipped) return;
  flipped = true;
  document.getElementById('ci').classList.add('flipped');
  document.getElementById('fb').classList.remove('hidden');
}

function rate(q) {
  const db  = load();
  const idx = db.findIndex(x => x.word === queue[qIdx].word);
  if (idx >= 0) save(db.map((c, i) => i === idx ? sm2(c, q) : c));
  qIdx++;
  renderCard();
}

async function doImport() {
  const raw = document.getElementById('import-input').value;
  if (!raw.trim()) { setStatus('enter some words first', 'err'); return; }
  const words = raw.split(/[\n,]+/).map(w => w.trim()).filter(Boolean);
  const log   = document.getElementById('import-log');
  log.innerHTML = '';
  document.getElementById('import-input').value = '';

  for (const w of words) {
    const db = load();
    if (db.find(x => x.word.toLowerCase() === w.toLowerCase())) {
      log.innerHTML += `<div class="log-skip">⊘ "${w}" already in library</div>`; continue;
    }
    const row = document.createElement('div');
    row.className = 'log-loading';
    row.textContent = `⋯ fetching "${w}"…`;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    try {
      const info = await fetchWord(w);
      const card = { ...info, ef: 2.5, reps: 0, interval: 1, nextReview: today(), added: today() };
      const db2  = load();
      db2.push(card);
      save(db2);
      todayNew++;
      row.className   = 'log-ok';
      row.textContent = `✓ "${info.word}" — ${info.definition.slice(0,60)}${info.definition.length>60?'…':''}`;
    } catch {
      row.className   = 'log-err';
      row.textContent = `✗ "${w}" — not found in dictionary`;
    }
    log.scrollTop = log.scrollHeight;
  }
  setStatus('done', 'ok');
  renderImportList();
  renderHome();
}

function setStatus(msg, type) {
  const el = document.getElementById('import-status');
  el.textContent = msg;
  el.style.color  = type === 'err' ? 'var(--red-text)' : 'var(--green-text)';
  setTimeout(() => el.textContent = '', 3000);
}

function renderImportList() {
  const db = load();
  const el = document.getElementById('import-list');
  if (!db.length) { el.innerHTML = '<div class="empty">no words yet</div>'; return; }
  el.innerHTML = db.map(c => `
    <div class="word-item">
      <span class="name">${c.word}</span>
      <span class="phon">${c.phonetic || ''}</span>
      <span class="badge ${c.reps ? 'badge-ok' : 'badge-new'}">${c.reps ? 'rep ' + c.reps : 'new'}</span>
      <button class="del-btn" onclick="deleteWord('${c.word}')">remove</button>
    </div>`).join('');
}

function deleteWord(word) {
  save(load().filter(c => c.word !== word));
  renderImportList();
  renderHome();
}

renderHome();
</script>
</body>
</html>
